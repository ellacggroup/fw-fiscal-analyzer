# Tells Railway's build system which languages to install.
# Python 3.12 for the backend, Node 20 for building the React frontend.

[phases.setup]
nixPkgs = ["python312Full", "nodejs_20"]

[phases.install]
cmds = [
  "pip install -r backend/requirements.txt",
  "cd frontend && npm install"
]

[phases.build]
cmds = ["cd frontend && npm run build"]

[start]
cmd = "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
